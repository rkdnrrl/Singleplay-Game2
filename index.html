<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>설거지 클리커</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="hud">
      <div class="hud-block">
        <span class="hud-label">점수</span>
        <span id="score" class="hud-value">0</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">최고 기록</span>
        <span id="highScore" class="hud-value">0</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">깨끗한 접시</span>
        <span id="cleaned" class="hud-value">0</span>
      </div>
      <div class="hud-block hud-coin" id="coinBlock">
        <span class="hud-label">🪙 게임머니</span>
        <span id="coinCount" class="hud-value coin-value">-</span>
      </div>
    </header>

    <p class="hint">접시를 연타해서 얼룩을 지우세요. 완전히 닦이면 보너스!</p>

    <main class="stage" id="stage">
      <div class="stain-layer" id="stainLayer" aria-hidden="true"></div>
      <button type="button" id="dish" class="dish" aria-label="접시 닦기">
        <span class="dish-rim"></span>
        <span class="dish-face"></span>
        <span class="dish-shine"></span>
      </button>
      <div class="hp-bar" role="status" aria-live="polite">
        <div class="hp-fill" id="hpFill"></div>
      </div>
      <p class="hp-label"><span id="hpLabelText">남은 얼룩</span></p>
    </main>

    <footer class="footer">
      <span id="combo" class="combo hidden">콤보 ×1</span>
    </footer>
  </div>
  <script src="config.js"></script>
  <script src="game.js"></script>
</body>
</html>
